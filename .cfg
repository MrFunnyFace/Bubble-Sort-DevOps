CXX = g++
CXXFLAGS = -Wall -std=c++17

SRC = src/main.cpp
EXEC = build/main

DEB_NAME = bubblesort
DEB_VERSION = 1.0
DEB_DIR = deb_package

all: $(EXEC)

$(EXEC): $(SRC)
	export LD_LIBRARY_PATH=/usr/local/lib
	mkdir -p build
	$(CXX) $(CXXFLAGS) $(SRC) -o $(EXEC) \
		-lprometheus-cpp-pull \
		-lprometheus-cpp-core \		
		-lpthread \
		-lz

deb: $(EXEC)
	@echo "Очистка старого пакета..."
	rm -rf $(DEB_DIR)

	@echo "Создание структуры..."
	mkdir -p $(DEB_DIR)/DEBIAN
	mkdir -p $(DEB_DIR)/usr/bin

	@echo "Копирование бинарника..."
	install -m 755 $(EXEC) $(DEB_DIR)/usr/bin/$(DEB_NAME)

	@echo "Создание control..."
	echo "Package: $(DEB_NAME)" > $(DEB_DIR)/DEBIAN/control
	echo "Version: $(DEB_VERSION)" >> $(DEB_DIR)/DEBIAN/control
	echo "Section: base" >> $(DEB_DIR)/DEBIAN/control
	echo "Priority: optional" >> $(DEB_DIR)/DEBIAN/control
	echo "Architecture: amd64" >> $(DEB_DIR)/DEBIAN/control
	echo "Depends: libc6 (>= 2.31)" >> $(DEB_DIR)/DEBIAN/control
	echo "Maintainer: You <you@mail.com>" >> $(DEB_DIR)/DEBIAN/control
	echo "Description: Bubble sort program" >> $(DEB_DIR)/DEBIAN/control

	chmod 755 $(DEB_DIR)/DEBIAN
	chmod 644 $(DEB_DIR)/DEBIAN/control

	@echo "Сборка пакета..."
	dpkg-deb --build $(DEB_DIR)

	@echo "Готово: $(DEB_DIR).deb"

clean_deb:
	rm -rf $(DEB_DIR)
	rm -f $(DEB_DIR).deb

run: $(EXEC)
	./$(EXEC)

clean:
	rm -rf build

docker_build: 
	eval $(minikube docker-env)
	docker build -t bubblesort:latest .

docker_run:
	docker run -p 8080:8080 -p 9090:9090 bubblesort:latest

k8s_helm_install:
	helm install bubblesort bubblesort_k8s/

k8s_helm_uninstall:
	helm uninstall bubblesort

.PHONY: all clean run deb clean_deb docker_build docker_run k8s_helm_uninstall k8s_helm_install
name: CI Pipeline

on:
  push:
    branches: [ "4PR" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git libcurl4-openssl-dev zlib1g-dev

      - name: Build prometheus-cpp
        run: |
          cd src/prometheus-cpp
          mkdir build && cd build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_PUSH=OFF \
            -DENABLE_COMPRESSION=OFF \
            -DENABLE_TESTING=OFF
          make -j4
          sudo make install

      - name: Build project
        run: make
        
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git libcurl4-openssl-dev curl zlib1g-dev

      - name: Build prometheus-cpp
        run: |
          cd src/prometheus-cpp
          git submodule update --init --recursive
          mkdir build && cd build
          cmake ..
          make -j4
          sudo make install

      - name: Build app
        run: make

      - name: Run app in background
        run: |
          ./build/main &
          sleep 2

      - name: Test HTTP endpoint
        run: |
          curl -f http://localhost:8080

      - name: Test metrics endpoint
        run: |
          curl -f http://localhost:9090

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl

      - name: Install Minikube
        run: |
          curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/stable.txt"
          curl -LO "https://dl.k8s.io/release/$(cat stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Start Minikube
        run: |
          minikube start --driver=docker

      - name: Build Docker image inside Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t bubblesort:latest .

      - name: Deploy via Helm
        run: |
          helm install bubblesort bubblesort_k8s/

      - name: Wait for pods
        run: |
          kubectl wait --for=condition=ready pod -l app=bubblesort --timeout=120s

      - name: Test service via port-forward
        run: |
          kubectl port-forward svc/bubblesort 8080:80 &
          sleep 5
          curl -f http://localhost:8080